name: 전국 지역 데이터 생성

on:
  workflow_dispatch:
    inputs:
      kakao_key:
        description: 'Kakao REST API Key (없으면 시크릿 사용)'
        required: false

jobs:
  geocode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/serene-pascal-0O9Sq
          fetch-depth: 0

      - name: 배포 브랜치에서 regions.json 경로 준비
        run: mkdir -p data

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 좌표 생성 스크립트 실행
        env:
          KAKAO_REST_API_KEY: ${{ inputs.kakao_key || secrets.KAKAO_REST_API_KEY }}
        run: node scripts/geocode-regions.js

      - name: regions.json을 배포 브랜치에 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin claude/serene-pascal-0O9Sq
          git checkout claude/serene-pascal-0O9Sq
          git add data/regions.json data/regions_cache.json
          git diff --cached --quiet && echo "변경사항 없음" || git commit -m "chore: update nationwide regions data"
          git push origin claude/serene-pascal-0O9Sq
