<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>집터 — 주거 추천</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --bg: #F2F4F6;
    --surface: #FFFFFF;
    --ink: #2A313B;
    --ink-2: #4E5968;
    --ink-3: #8B95A1;
    --line: #E5E8EB;
    --good: #15B97E;
    --good-weak: #E3F7EF;
    --mid: #F59000;
    --mid-weak: #FFF1DD;
    --accent: #3182F6;
    --accent-weak: #EAF2FE;
    --accent-press: #1B64DA;
    --card-shadow: 0 1px 2px rgba(23,31,40,0.045), 0 4px 10px -2px rgba(23,31,40,0.05), 0 16px 32px -12px rgba(23,31,40,0.09);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%; background: #DFE3E8;
    font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    overscroll-behavior: none;
  }
  #root { height: 100%; }
  #root :where(h1, h2, h3, p, span, div, button, input, label, a) {
    font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', system-ui, sans-serif;
  }
  button { font-family: inherit; }
  input { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; display: none; }
  @keyframes screenIn { from { transform: translateX(12px); } to { transform: translateX(0); } }
  @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes popIn { from { transform: translateY(8px); } to { transform: translateY(0); } }
</style>
</head>
<body style="font-family: Pretendard">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="screens-flow.jsx"></script>
<script type="text/babel" src="screens-results.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
